<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointments | CityCare Hospital</title>
    <link rel="stylesheet" href="doctor-appointments.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            
            <!-- Logo -->
            <div class="sidebar-logo">
                <a href="../../homepage/homepage.html">
                    <img src="../../../assets/Hospital-logo-without-bcg.jpg" alt="CityCare Hospital">
                </a>
                
            </div>

            <!-- Navigation -->
            <nav class="sidebar-menu">

                <a href="../dashboard/doctor-dashboard.html" class="menu-item">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Dashboard</span>
                </a>

                <a href="../profile/doctor-profile.html" class="menu-item">
                    <i class="fa-regular fa-user"></i>
                    <span>My Profile</span>
                </a>

                <a href="../appointments/doctor-appointments.html" class="menu-item active">
                    <i class="fa-regular fa-calendar-plus"></i>
                    <span>Appointments</span>
                </a>

            </nav>

            <!-- Divider -->
            <div class="sidebar-divider"></div>

            <!-- Logout -->
            <div class="sidebar-logout">
                <a href="#" id="logoutBtn" class="menu-item">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>

            <!-- Support Card -->
            <div class="support-card">
                <div class="support-icon">
                    <i class="fa-solid fa-shield-virus"></i>
                </div>

                <h4>Need Help?</h4>

                <p>
                    Contact our support team
                    for assistance.
                </p>

                <button>Contact Support</button>
            </div>

        </aside>


        <main class="main-content">
            <header class="dashboard-header">

                <div class="profile-breadcrumb">
                    <h1>MY APPOINTMENTS</h1>
                    <div id="messageBox"></div>
                    <p id="appointmentCount"></p>
                </div>
            
                <div class="header-right">
                    <div class="profile-menu">
                        <div class="profile-avatar" id="profileAvatar"></div>
                        <span id="doctorName"></span>
                    </div>
            
                </div>
            
            </header>

            <section class="appointments-card">
                <div class="appointment-table" id="appointmentsTable"></div>
            </section>

        </main>
    </div>

    <script src="../../config.js"></script>
    <script src="doctor-appointments.js"></script>
</body>
</html>
