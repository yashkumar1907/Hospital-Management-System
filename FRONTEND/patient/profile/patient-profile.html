<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile | CityCare Hospital</title>
    <link rel="stylesheet" href="patient-profile.css">
    <link rel="stylesheet" href="../../confirm-toast/confirm.css">
    <link rel="stylesheet" href="../../confirm-toast/toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../../../assets/favicon.jpg">
</head>
<body>
    <div class="dashboard-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            
            <!-- Logo -->
            <div class="sidebar-logo">
                <a href="../../homepage/homepage.html">
                    <img src="../../../assets/Hospital-logo-without-bcg.jpg" alt="CityCare Hospital">
                </a>
            </div>

            <!-- Navigation -->
            <nav class="sidebar-menu">

                <a href="../dashboard/patient-dashboard.html" class="menu-item">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Dashboard</span>
                </a>

                <a href="../profile/patient-profile.html" class="menu-item active">
                    <i class="fa-regular fa-user"></i>
                    <span>My Profile</span>
                </a>

                <a href="../appointment/patient-book-appointment.html" class="menu-item">
                    <i class="fa-regular fa-calendar-plus"></i>
                    <span>Book Appointment</span>
                </a>

                <a href="../my-appointments/patient-my-appointments.html" class="menu-item">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>My Appointments</span>
                </a>
            </nav>

            <!-- Divider -->
            <div class="sidebar-divider"></div>

            <!-- Logout -->
            <div class="sidebar-logout">
                <a href="#" id="logoutBtn" class="menu-item">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>

        </aside>

        <main class="main-content">
            <header class="dashboard-header">

                <div class="profile-breadcrumb">
                    <h1>MY PROFILE</h1>
                </div>
            
                <div class="header-right">
                    <div class="profile-menu">
                        <img id="profileAvatar" class="profile-avatar-img" src="../../../assets/default-patient.jpg" alt="Patient">
                        <span id="headerPatientName">Patient Name</span>
                    </div>            
                </div>
            </header>

            <section class="profile-page">
                <div class="profile-card">
                    <div class="profile-left">
                        <img id="profileImage" class="profile-image" src="../../../assets/default-patient.jpg" alt="Patient">

                        <div class="profile-info">
                            <h2 id="profileName">Patient Name</h2>
                            <p>
                                <i class="fa-regular fa-envelope"></i><span id="profileEmail">patient@email.com</span>
                            </p>
                            <p>
                                <i class="fa-solid fa-phone"></i><span id="profilePhone">9876543210</span>
                            </p>
                        </div>
                    </div>
            
                    <button class="edit-profile-btn" id="editProfileBtn">
                        <i class="fa-regular fa-pen-to-square"></i>Edit Profile
                    </button>
                </div>
            </section>

            <div class="personal-info-card">
                <h3>Personal Information</h3>
            
                <div class="info-row">
                    <span>Full Name</span>
                    <strong id="fullName"></strong>
                </div>
            
                <div class="info-row">
                    <span>Date of Birth</span>
                    <strong id="dob"></strong>
                </div>
            
                <div class="info-row">
                    <span>Gender</span>
                    <strong id="gender"></strong>
                </div>
            
                <div class="info-row">
                    <span>Email</span>
                    <strong id="email"></strong>
                </div>
            
                <div class="info-row">
                    <span>Phone Number</span>
                    <strong id="phone"></strong>
                </div>

                <div class="info-row">
                    <span>Blood Group</span>
                    <strong id="bloodGroup"></strong>
                </div>
                <div class="info-row">
                    <span>Emergency Contact</span>
                    <strong id="emergencyContact"></strong>
                </div>
                
                <div class="info-row">
                    <span>Allergies</span>
                    <strong id="allergies"></strong>
                </div>
                
                <div class="info-row">
                    <span>Medical History</span>
                    <strong id="medicalHistory"></strong>
                </div>
            </div>
        </main>
    </div>


    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editProfileModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <button id="closeModal">×</button>
            </div>

            <div class="modal-form">
                <div class="form-group photo-group">
                    <label>Patient Photo</label>
                
                    <div class="edit-photo-section">
                        <img id="editPhotoPreview" class="edit-photo-preview" src="../../../assets/default-patient.jpg" alt="Patient">
                        <label for="editPatientPhoto" class="change-photo-btn">
                            <i class="fa-solid fa-camera"></i>
                            Change Photo
                        </label>
                        <input type="file" id="editPatientPhoto" accept="image/*"hidden>
                    </div>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editName">
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="editDob">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select id="editGender">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Blood Group</label>
                    <select id="editBloodGroup">
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail">
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="editPhone" maxlength="10" inputmode="numeric">
                </div>

                <div class="form-group">
                    <label>Emergency Contact</label>
                    <input type="tel" id="editEmergencyContact" maxlength="10" inputmode="numeric">
                </div>
                
                <div class="form-group">
                    <label>Allergies</label>
                    <input type="text" id="editAllergies">
                </div>
                
                <div class="form-group photo-group">
                    <label>Medical History</label>
                    <textarea id="editMedicalHistory"></textarea>
                </div>

            </div>

            <div id="messageBox"></div>

            <div class="modal-footer">
                <button class="cancel-btn" id="cancelBtn">
                    Cancel
                </button>

                <button class="save-btn" id="saveProfileBtn">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script src="../../config.js"></script>
    <script src="../../confirm-toast/confirm.js"></script>
    <script src="../../confirm-toast/toast.js"></script>
    <script src="patient-profile.js"></script>
</body>
</html>
